defaults:
  - filepaths: filepaths
  - _self_

casp_study: ???
eq_cache: ${filepaths.artifacts}/.cache/equilibrator/compounds.sqlite
p_h: 7.5
p_mg: 3.0
ionic_strength: 0.25M
temperature: 298.15K
conc_lb: 1e-6 # Molecule concentraiton lower bound (M)
conc_ub: 1e-2 # Molecule concentration upper bound (M)

hydra:
  output_subdir: .analyze_thermo
  run:
    dir: ${filepaths.processed_data}/${...casp_study}
  job:
    chdir: True
  sweep:
    dir: ${filepaths.processed_data}/${...casp_study}
    subdir: .