defaults:
  - filepaths: filepaths
  - _self_

forward_expansion: null # Subdirectory containing reactions and compounds parquet files for forward expansion
retro_expansion: null # Subdirectory containing reactions and compounds parquet files for retro expansion
casp_study: ??? # Name of subdirectory where to store outputs for this CASP study
pnmc_lb: 0.0 # Product-normalized mass contribution lower bound for connecting molecules in known reaction network
rnmc_lb: 0.0 # Reactant-normalized mass contribution lower bound for connecting molecules in known reaction network
source_augmented_pnmc_lb: 1.0 # Augmented with source molecules assumed available
processes: null # Number of processes for parallel network construction; null defaults to os.cpu_count()
expansion_superdir: ${filepaths.raw_data}/expansions
fwd_dir: ${expansion_superdir}/${forward_expansion}
retro_dir: ${expansion_superdir}/${retro_expansion}
expansion_config: .expand/config.yaml
cpds: compounds.parquet
am_rxns: reactions.parquet

hydra:
  output_subdir: .linear_pathfinding
  run:
    dir: ${filepaths.processed_data}/${...casp_study}
  job:
    chdir: True
  sweep:
    dir: ${filepaths.processed_data}/${...casp_study}
    subdir: .